<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things: Eventos de Luces</title>
    <link rel="stylesheet" href="joyce.css" type="text/css" media="screen">
    <script src="joyce.js" defer></script>


</head>
<body>

    <header>
        <h1 class="st-title">EL TELÉFONO DE JOYCE</h1>
    </header>

    <main class="wall-container">
        <h2 class="text-xl font-semibold mb-4 text-center">Si no has visto la serie, te contamos qué pasa... o no... </h2>
        
        <!-- Área de visualización de la palabra -->
        <div class="mb-6">
            <p class="text-lg mb-2">Mensaje de Will:</p>
            <div id="mensaje-will"></div>
        </div>

        <!-- Botones de Acción -->
        <div class="contenedor-botones">
            <button id="btn-borrar">
                Borrar Mensaje
            </button>
            <button id="btn-luces-intercambio">
                Intercambiar Luces (On/Off)
            </button>
        </div>
        
        <!-- Área de las Luces/Alfabeto (Target del ejercicio) -->
        <div id="luces-alfabeto">
            <!-- Las bombillas se generarán aquí con JavaScript para facilitar el ejercicio -->
        </div>

    </main>

    <footer class="mt-8 text-center text-gray-400 text-sm">
        <p>Examen DWC: Manipulación de Eventos y DOM en JavaScript.</p>
    </footer>


</body>
</html>
