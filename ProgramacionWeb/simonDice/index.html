<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>SimonDice</title>
</head>
<body>
    <h1>Simon Dice</h1>
    <p id="nivel">Nivel: 0</p>
    <div class="container" id="tablero">
        <div id="red" class="item red"></div>
        <div id="green" class="item green"></div>
        <div id="blue" class="item blue"></div>
        <div id="yellow" class="item yellow"></div>
    </div>
    <button class="submit" type="submit" onclick="iniciarJuego()">Iniciar Simon Dice</button>
    <p id="mensaje"></p>
    <script src="script.js"></script>
</body>
</html>
