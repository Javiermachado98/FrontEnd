<p>login works!</p>
<div class="login-container" style="max-width: 350px; margin: 80px auto; padding: 20px; border: 2px solid #333; border-radius: 8px; font-family: Arial, sans-serif;">
  <h2 style="text-align: center; color: #2c3e50;">🔑 Terminal de Acceso</h2>
  
  <div style="margin-bottom: 15px;">
    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Usuario:</label>
    <input [(ngModel)]="username" type="text" placeholder="Introduce 'admin'" style="width: 100%; padding: 8px; box-sizing: border-box;">
  </div>

  <div style="margin-bottom: 15px;">
    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Contraseña:</label>
    <input [(ngModel)]="password" type="password" placeholder="Introduce '1234'" style="width: 100%; padding: 8px; box-sizing: border-box;">
  </div>

  <button (click)="onLogin()" style="width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px;">
    Ingresar al Sistema
  </button>

  @if (errorMessage()) {
    <p style="color: red; text-align: center; font-weight: bold; margin-top: 15px;">{{ errorMessage() }}</p>
  }
</div>
